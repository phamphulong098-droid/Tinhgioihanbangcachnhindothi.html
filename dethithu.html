            border-radius: 4px;

            margin-bottom: 15px;
            color: var(--primary-color);

            list-style: none;
            padding: 0;
            margin: 0;

            background-color: #f0f4f8;
            border-color: var(--secondary-color);
        }

            margin-right: 12px;

            cursor: pointer;

            border-color: var(--success-color) !important;
            color: #155724;
            font-weight: bold;

        .option-item.incorrect {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .option-item.disabled {
            cursor: not-allowed;
            opacity: 0.8;

</head>

                "Hàm số đồng biến trên toàn bộ khoảng chứa điểm 4."
            ],
            answer: 2,
            explanation: "Chấm trắng nghĩa là đồ thị bị đục lỗ tại cao độ đó, bài giảng nêu: 'nó xuyên qua đường thẳng đó luôn... không bằng $f(4)$... nên tại 4 hàm không liên tục.'",
            tip: "Mẹo: Giới hạn tồn tại ($=4$) nhưng không bằng giá trị hàm số thực tế tạo nên kiểu gián đoạn khử được (điểm thủng)."
        },

        // --- 5 CÂU BÀI TẬP: KHÓ ---
        {
            type: "kho",
            levelLabel: "Bài tập - Khó",
            question: "Tổng số điểm gián đoạn (không liên tục) của hàm số được khảo sát trong toàn bộ đồ thị bài giảng là bao nhiêu?",
            options: [
                "1 điểm",
                "2 điểm",
                "3 điểm",
                "4 điểm"
            ],
            answer: 2,
            explanation: "Thầy Duymt chốt lại ở cuối bài: 'Như vậy chốt lại là những cái điểm mà hàm số không liên tục đó là điểm $x = 4$, $x = 2$ và $x = 0$ làm cho hàm số không liên tục.' Tổng cộng có 3 điểm.",
            tip: "Mẹo: Gom hết tất cả những chỗ có hiện tượng đứt khúc rời rạc hoặc đục lỗ trên trục hoành: gồm các tọa độ 0, 2, 4."
        },
        {
            type: "kho",
            levelLabel: "Bài tập - Khó",
            question: "Sự khác biệt bản chất giữa điểm gián đoạn tại $x = 0$ và điểm gián đoạn tại $x = 4$ trên đồ thị là gì?",
            options: [
                "Tại $x=0$ tồn tại giới hạn tổng quát, còn tại $x=4$ thì không.",
                "Tại $x=0$ đồ thị liền mạch, tại $x=4$ đồ thị nhảy bậc.",
                "Tại $x=0$ gián đoạn do giới hạn trái/phải khác nhau (đứt gãy); tại $x=4$ giới hạn hai bên bằng nhau nhưng khác giá trị hàm số tại điểm đó (điểm thủng).",
                "Không có sự khác biệt nào về mặt hình học."
            ],
            answer: 2,
            explanation: "Tại $x=0$, hai nhánh lệch hẳn nhau về độ cao (2 và 0). Tại $x=4$, hai nhánh chụm chung vào một điểm nhưng điểm đó bị rỗng (chấm trắng).",
            tip: "Mẹo: Nhảy bậc (Đứt gãy) $\\to$ Không có giới hạn. Thủng lỗ $\\to$ Có giới hạn nhưng không bằng $f(x_0)$."
        },
        {
            type: "kho",
            levelLabel: "Bài tập - Khó",
            question: "Giả sử ta định nghĩa lại hàm số tại điểm thủng bằng cách điền đầy dấu chấm trắng tại $x=4$ sao cho $f(4) = 4$. Khẳng định nào sau đây đúng?",
            options: [
                "Hàm số vẫn gián đoạn tại $x = 4$.",
                "Hàm số trở nên liên tục tại $x = 4$.",
                "Hàm số sẽ bị gián đoạn tại cả điểm $x = 1$.",
                "Giới hạn $\\lim_{x \\to 4} f(x)$ sẽ thay đổi giá trị thành vô cùng."
            ],
            answer: 1,
            explanation: "Nếu điền đầy chấm trắng, ta có $\\lim_{x \\to 4} f(x) = f(4) = 4$. Lúc này cả 3 điều kiện liên tục được thỏa mãn, biến điểm gián đoạn thành điểm liên tục.",
            tip: "Mẹo: Vá lại điểm thủng trên đồ thị giúp đồ thị trở nên liền mạch không tì vết."
        },
        {
            type: "kho",
            levelLabel: "Bài tập - Khó",
            question: "Xét biểu thức $S$ là tổng các giới hạn phải tại các điểm khảo sát: $S = \\lim_{x \\to 0^+} f(x) + \\lim_{x \\to 2^+} f(x) + \\lim_{x \\to 4^+} f(x)$. Giá trị của $S$ là:",
            options: [
                "2",
                "4",
                "6",
                "0"
            ],
            answer: 2,
            explanation: "Dựa vào các kết quả tính toán từ đồ thị: $\\lim_{x \\to 0^+} f(x) = 2$, $\\lim_{x \\to 2^+} f(x) = 0$, và $\\lim_{x \\to 4^+} f(x) = 4$. Do đó $S = 2 + 0 + 4 = 6$.",
            tip: "Mẹo: Đọc chuẩn các giới hạn bên PHẢI tại 3 mốc rồi cộng đại số lại với nhau."
        },
        {
            type: "kho",
            levelLabel: "Bài tập - Khó",
            question: "Xét mệnh đề: '(I) Hàm số có giới hạn tổng quát tại $x=2$'; '(II) Hàm số có giới hạn tổng quát tại $x=4$'. Chọn nhận định đúng:",
            options: [
                "Cả (I) và (II) đều đúng.",
                "Cả (I) và (II) đều sai.",
                "(I) đúng, (II) sai.",
                "(I) sai, (II) đúng."
            ],
            answer: 3,
            explanation: "Tại $x=2$ giới hạn không tồn tại do hai bên lệch nhau ($-2 \\neq 0$) $\\to$ (I) sai. Tại $x=4$ giới hạn tồn tại và bằng 4 $\\to$ (II) đúng.",
            tip: "Mẹo: Nhớ kỹ bản chất: Cứ chụm đầu vào một điểm (dù rỗng) là có giới hạn, cứ lệch cao độ ra là không có giới hạn."
        }
    ];

    let userAnswers = {};
    let score = 0;

    // Hàm khởi tạo và hiển thị danh sách câu hỏi
    function initQuiz() {
        const container = document.getElementById('quiz-container');
        container.innerHTML = '';

        quizData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;

            // Tạo nhãn phân loại câu hỏi
            let badgeClass = 'badge-lythuyet';
            if (q.type === 'de') badgeClass = 'badge-de';
            if (q.type === 'trungbinh') badgeClass = 'badge-trungbinh';
            if (q.type === 'kho') badgeClass = 'badge-kho';

            card.innerHTML = `
                <span class="badge ${badgeClass}">${q.levelLabel}</span>
                <div class="question-text">Câu ${index + 1}: ${q.question}</div>
                <ul class="options-list">
                    ${q.options.map((opt, optIdx) => `
                        <li class="option-item" id="opt-${index}-${optIdx}" onclick="selectOption(${index}, ${optIdx})">
                            <input type="radio" name="q-${index}" id="radio-${index}-${optIdx}" disabled>
                            <label style="cursor:pointer; width:100%;">${opt}</label>
                        </li>
                    `).join('')}
                </ul>
                <div class="explanation-box" id="explain-${index}">
                    <strong style="color:var(--primary-color);">💡 Lời giải chi tiết:</strong>
                    <p>${q.explanation}</p>
                    <div class="tip-box">
                        <strong>⚡ Mẹo làm nhanh:</strong> ${q.tip}
                    </div>
                </div>
            `;
            container.innerHTML += card.innerHTML;
        });

        // Kích hoạt lại sự kiện click do gán innerHTML làm mất bind gốc
        quizData.forEach((q, index) => {
            q.options.forEach((opt, optIdx) => {
                const item = document.getElementById(`opt-${index}-${optIdx}`);
                item.onclick = () => selectOption(index, optIdx);
            });
        });

        // Gọi MathJax biên dịch lại các công thức toán vừa chèn vào HTML
        if (window.MathJax && window.MathJax.typeset) {
            window.MathJax.typeset();
        }
    }

    // Xử lý sự kiện khi người dùng chọn đáp án
    function selectOption(qIdx, optIdx) {
        // Nếu câu hỏi này đã được trả lời rồi thì khóa không cho chọn lại
        if (userAnswers.hasOwnProperty(qIdx)) return;

        userAnswers[qIdx] = optIdx;
        const correctAns = quizData[qIdx].answer;

        // Đánh dấu radio tương ứng
        document.getElementById(`radio-${qIdx}-${optIdx}`).checked = true;

        // Kiểm tra đúng sai để đổi màu nền trực quan
        if (optIdx === correctAns) {
            document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('correct');
            score++;
            document.getElementById('score-text').innerText = score;
        } else {
            document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('incorrect');
            // Đồng thời hiển thị màu xanh cho đáp án đúng để đối chiếu
            document.getElementById(`opt-${qIdx}-${correctAns}`).classList.add('correct');
        }

        // Khóa tất cả các lựa chọn khác của câu này
        quizData[qIdx].options.forEach((_, i) => {
            document.getElementById(`opt-${qIdx}-${i}`).classList.add('disabled');
        });

        // Cập nhật tiến độ tiến trình bài làm
        const totalAnswered = Object.keys(userAnswers).length;
        document.getElementById('progress-text').innerText = `${totalAnswered}/20`;

        // Hiển thị hộp thoại giải thích và mẹo làm bài giải chi tiết
        const explainBox = document.getElementById(`explain-${qIdx}`);
        explainBox.style.display = 'block';

        // Gọi lại MathJax để render công thức toán học phát sinh trong phần giải thích
        if (window.MathJax && window.MathJax.typeset) {
            window.MathJax.typeset();
        }
    }

    // Hàm tạo tính năng cho phép người dùng tải ngược chính file này về máy tính cá nhân
    function downloadApp() {
        const htmlContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const link = document.getElementById('downloadLink');
        link.href = URL.createObjectURL(blob);
        link.download = 'tracnghiem_gioihan_tuongtac.html';
    }

    // Chạy ứng dụng ngay khi trang tải xong
    window.onload = initQuiz;
</script>
